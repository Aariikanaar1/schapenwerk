<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Schapenwerk</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Schapenwerk">
  <meta name="theme-color" content="#0077cc">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230077cc'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-family='monospace'%3E🐑%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f5f7fb; overflow-x: hidden; touch-action: pan-y pinch-zoom; }
    .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; }
    .side-menu { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: white; z-index: 1001; transition: left 0.3s ease; box-shadow: 2px 0 12px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
    .side-menu.open { left: 0; }
    .menu-header { padding: 24px 20px; background: #0077cc; color: white; }
    .menu-header h2 { font-size: 1.3rem; margin-bottom: 4px; }
    .menu-header p { font-size: 0.7rem; opacity: 0.8; }
    .menu-items { flex: 1; padding: 12px 0; }
    .menu-item { display: flex; align-items: center; gap: 14px; padding: 14px 20px; width: 100%; border: none; background: none; cursor: pointer; font-size: 0.95rem; font-weight: 500; color: #1e293b; transition: background 0.2s; text-align: left; }
    .menu-item:hover { background: #f1f5f9; }
    .menu-item.active { background: #eef2ff; color: #0077cc; border-right: 3px solid #0077cc; }
    .menu-item span:first-child { font-size: 1.2rem; width: 32px; }
    .menu-footer { padding: 20px; border-top: 1px solid #e2e8f0; font-size: 0.7rem; color: #64748b; text-align: center; }
    .menu-toggle { position: fixed; top: 12px; left: 12px; width: 44px; height: 44px; background: #0077cc; border: none; border-radius: 30px; color: white; font-size: 1.5rem; cursor: pointer; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
    .menu-toggle:active { transform: scale(0.95); }
    .page-frame { padding: 20px 16px 80px 16px; min-height: 100vh; }
    .warning-toast { position: fixed; bottom: 100px; left: 16px; right: 16px; background: #fef3c7; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 16px; font-size: 0.75rem; color: #92400e; z-index: 200; display: none; }
    .update-toast { position: fixed; top: 0; left: 0; right: 0; background: #10b981; color: white; padding: 12px 16px; text-align: center; font-size: 14px; z-index: 2000; display: none; }
    .update-toast button { background: white; color: #10b981; margin-left: 12px; padding: 6px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
    iframe { width: 100%; height: calc(100vh - 70px); border: none; background: #f5f7fb; }
    .loading { text-align: center; padding: 50px; color: #64748b; }
  </style>
</head>
<body>

<div id="updateToast" class="update-toast">
  <span>🔄 Nieuwe versie beschikbaar!</span>
  <button id="updateNowBtn">Update nu</button>
</div>
<div class="warning-toast" id="warningToast"></div>
<button class="menu-toggle" id="menuToggleBtn">☰</button>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="side-menu" id="sideMenu">
  <div class="menu-header"><h2>🐑 Schapenwerk</h2><p>Uren & Kilometervergoeding</p></div>
  <div class="menu-items" id="menuItemsContainer"></div>
  <div class="menu-footer"><span id="versionFooter">v5.0</span></div>
</div>

<main id="mainContent">
  <div id="pageContainer" class="page-frame">
    <div class="loading">📱 Laden...</div>
  </div>
</main>

<script>
// ========== MENU ITEMS ==========
const allMenuItems = [
  { id: "werkdag", name: "Werkdag", icon: "🐑", featureKey: "toggleWerkdag" },
  { id: "privé-rit", name: "Privé rit", icon: "🏠", featureKey: "togglePriveRit" },
  { id: "werkdagen", name: "Werkdagen", icon: "📋", featureKey: "toggleWerkdagen" },
  { id: "locaties", name: "Locaties beheren", icon: "📍", featureKey: "toggleLocaties" },
  { id: "stappenteller", name: "Stappenteller", icon: "👣", featureKey: "toggleStappenteller" },
  { id: "kilometerregistratie", name: "Kilometerregistratie", icon: "📟", featureKey: "toggleKilometerregistratie" },
  { id: "contacten", name: "Contacten", icon: "📇", featureKey: "toggleContacten" },
  { id: "facturen", name: "Facturen", icon: "📄", featureKey: "toggleFacturen" },
  { id: "factuur-maken", name: "Factuur maken", icon: "💰", featureKey: "toggleFactuurMaken" },
  { id: "instellingen", name: "Instellingen", icon: "⚙️", featureKey: "toggleInstellingen" },
  { id: "feedback", name: "Feedback", icon: "💬", featureKey: "toggleFeedback" }
];

function loadPageVisibilitySettings() {
  const settings = {};
  allMenuItems.forEach(item => {
    const value = localStorage.getItem(item.featureKey);
    settings[item.featureKey] = value !== null ? value === 'true' : true;
  });
  return settings;
}

function renderMenu() {
  const settings = loadPageVisibilitySettings();
  const container = document.getElementById('menuItemsContainer');
  if(!container) return;
  
  container.innerHTML = '';
  
  allMenuItems.forEach(item => {
    if(settings[item.featureKey]) {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.setAttribute('data-page', item.id);
      btn.innerHTML = `<span>${item.icon}</span> ${item.name}`;
      btn.onclick = () => {
        loadPage(item.id);
        closeMenu();
      };
      container.appendChild(btn);
    }
  });
}

// Luister naar berichten van iframe om menu te verversen
window.addEventListener('message', (event) => {
  if(event.data && event.data.type === 'refreshMenu') {
    renderMenu();
  }
});

// ========== UPDATE DETECTIE ==========
let updateToast = document.getElementById('updateToast');
let updateNowBtn = document.getElementById('updateNowBtn');
let swRegistration = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/schapenwerk/sw.js')
    .then(registration => {
      swRegistration = registration;
      registration.update();
      setInterval(() => { registration.update(); }, 60 * 60 * 1000);
    })
    .catch(err => console.log('Service Worker fout:', err));
  
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data && event.data.type === 'UPDATE_AVAILABLE') {
      updateToast.style.display = 'block';
      setTimeout(() => { if (updateToast.style.display === 'block') updateToast.style.display = 'none'; }, 10000);
    }
  });
}

if (updateNowBtn) {
  updateNowBtn.onclick = () => {
    updateToast.style.display = 'none';
    if (swRegistration && swRegistration.waiting) {
      swRegistration.waiting.postMessage('skipWaiting');
      window.location.reload();
    } else {
      window.location.reload();
    }
  };
}

// ========== DRIE KEER KLIKKEN ==========
let powerPressCount = 0;
let powerPressTimer = null;

document.addEventListener('visibilitychange', () => {
  const quickActivate = localStorage.getItem('toggleQuickActivate') === 'true';
  if(quickActivate && document.hidden) {
    powerPressCount++;
    if(powerPressTimer) clearTimeout(powerPressTimer);
    powerPressTimer = setTimeout(() => { powerPressCount = 0; }, 1000);
  }
});

window.addEventListener('focus', () => {
  const quickActivate = localStorage.getItem('toggleQuickActivate') === 'true';
  if(quickActivate && powerPressCount >= 3) {
    powerPressCount = 0;
    loadPage('werkdag');
    showWarning('🔘 Snel gestart via aan/uit knop!');
  }
});

// ========== SWIPE ==========
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => { if(e.changedTouches[0].clientX - touchStartX > 50) openMenu(); });

// ========== MENU ==========
const menuToggle = document.getElementById('menuToggleBtn');
const sideMenu = document.getElementById('sideMenu');
const menuOverlay = document.getElementById('menuOverlay');
const pageContainer = document.getElementById('pageContainer');
const warningToast = document.getElementById('warningToast');

function showWarning(m) { 
  warningToast.innerHTML = m; 
  warningToast.style.display = 'block'; 
  setTimeout(() => { warningToast.style.display = 'none'; }, 4000); 
}
function closeMenu() { sideMenu.classList.remove('open'); menuOverlay.style.display = 'none'; }
function openMenu() { sideMenu.classList.add('open'); menuOverlay.style.display = 'block'; }
menuToggle.onclick = () => sideMenu.classList.contains('open') ? closeMenu() : openMenu();
menuOverlay.onclick = closeMenu;

// Pagina's laden
const pages = {
  werkdag: 'werkdag.html',
  'privé-rit': 'privé-rit.html',
  werkdagen: 'werkdagen.html',
  locaties: 'locaties.html',
  stappenteller: 'stappenteller.html',
  kilometerregistratie: 'kilometerregistratie.html',
  contacten: 'contacten.html',
  facturen: 'facturen.html',
  'factuur-maken': 'factuur-maken.html',
  instellingen: 'instellingen.html',
  feedback: 'feedback.html'
};

function loadPage(pageId) {
  const pageFile = pages[pageId];
  if(!pageFile) { pageContainer.innerHTML = '<div class="loading">❌ Pagina niet gevonden</div>'; return; }
  pageContainer.innerHTML = `<iframe id="pageFrame" src="${pageFile}" title="${pageId}"></iframe>`;
  localStorage.setItem('lastPage', pageId);
  
  window.addEventListener('message', (event) => {
    if(event.data && event.data.type === 'warning') showWarning(event.data.message);
  });
}

const lastPage = localStorage.getItem('lastPage') || 'werkdag';
loadPage(lastPage);
renderMenu();
document.getElementById('versionFooter').innerHTML = 'v5.0<br><span style="font-size:9px;">Factuur verbeterd</span>';
</script>
</body>
</html>

<script>
function generatePreview() {
  if(!currentClient) { alert('Laad eerst werkdagen'); return; }

  const vat = parseFloat(document.getElementById('vatPercentage').value);
  const secretMode = document.getElementById('secretModeToggle').checked;

  const headerFont = document.getElementById('fontHeaderSelect').value;
  const headerSize = document.getElementById('fontHeaderSize').value;
  const labelFont = document.getElementById('fontLabelSelect').value;
  const labelSize = document.getElementById('fontLabelSize').value;
  const contentFont = document.getElementById('fontContentSelect').value;
  const contentSize = document.getElementById('fontContentSize').value;

  const headerText = document.getElementById('invoiceHeader').value;
  const footerText = document.getElementById('invoiceFooter').value;

  const company = {
    name: localStorage.getItem('companyName') || '',
    contactName: localStorage.getItem('contactName') || '',
    street: localStorage.getItem('companyStreet') || '',
    location: localStorage.getItem('companyLocation') || '',
    iban: localStorage.getItem('companyIban') || '',
    kvk: localStorage.getItem('companyKvk') || ''
  };

  let totalWork = 0, totalKm = 0, totalHours = 0;
  let rows = '';
  let explanationRows = '';

  currentInvoiceWorkdays.forEach((day, idx) => {
    const include = document.getElementById(`include_${idx}`)?.checked;
    if(!include) return;

    const hours = parseFloat(document.getElementById(`hours_${idx}`)?.value) || 0;
    const km = parseFloat(document.getElementById(`km_${idx}`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`rate_${idx}`)?.value) || HOURLY_RATE;
    const desc = document.getElementById(`desc_${idx}`)?.value || 'Werkdag';

    const workAmt = hours * rate;

    totalWork += workAmt;
    totalKm += km;
    totalHours += hours;

    rows += `
      <tr>
        <td style="border:1px solid #000; padding:8px;">${formatDateToDutch(new Date(day.startWorkdayTime))}</td>
        <td style="border:1px solid #000; padding:8px;">${escapeHtml(desc)}</td>
        <td style="border:1px solid #000; padding:8px; text-align:right;">${km.toFixed(1)}</td>
        <td style="border:1px solid #000; padding:8px; text-align:right;">${hours.toFixed(2)}</td>
        <td style="border:1px solid #000; padding:8px; text-align:right;">€${workAmt.toFixed(2)}</td>
      </tr>`;

    explanationRows += `
      <tr>
        <td style="border:1px solid #000; padding:8px;">${formatDateToDutch(new Date(day.startWorkdayTime))}</td>
        <td style="border:1px solid #000; padding:8px;">${escapeHtml(desc)}</td>
        <td style="border:1px solid #000; padding:8px; text-align:right;">${hours.toFixed(2)}</td>
      </tr>`;
  });

  const kmCompensation = totalKm * KM_RATE;
  const subtotal = totalWork + kmCompensation;
  const btw = subtotal * (vat / 100);
  const grand = subtotal + btw;

  const invoiceNumber = `F${Date.now()}`;
  const invoiceDate = formatDateToDutch(new Date());

  const clientDisplay = `${currentClient.company || ''} ${currentClient.name || ''}`;
  const clientAddress = `${currentClient.street || ''}, ${currentClient.city || ''}`;
  const companyDisplay = `${company.name} ${company.contactName}`;
  const companyAddress = `${company.street}, ${company.location}`;

  // ======================
  // NORMALE FACTUUR
  // ======================
  let normalInvoice = `
  <div style="font-family:${contentFont}; font-size:${contentSize}px; max-width:900px; margin:auto;">

    ${headerText ? `<div style="font-family:${headerFont}; font-size:${headerSize}px;">${headerText}</div>` : ''}

    <h1 style="font-family:${labelFont};">Factuur</h1>

    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <div>
        <strong>${companyDisplay}</strong><br>
        ${companyAddress}<br>
        ${company.iban}<br>
        KvK: ${company.kvk}
      </div>
      <div style="text-align:right;">
        <strong>${clientDisplay}</strong><br>
        ${clientAddress}
      </div>
    </div>

    Factuurdatum: ${invoiceDate}<br>
    Factuurnummer: ${invoiceNumber}<br><br>

    <table style="width:100%; border-collapse:collapse;">
      <thead style="font-family:${labelFont}; font-size:${labelSize}px;">
        <tr>
          <th style="border:1px solid #000;">Datum</th>
          <th style="border:1px solid #000;">Wat</th>
          <th style="border:1px solid #000;">KM</th>
          <th style="border:1px solid #000;">Uren</th>
          <th style="border:1px solid #000;">€</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

    <div style="text-align:right; margin-top:20px;">
      Subtotaal: €${totalWork.toFixed(2)}<br>
      Reiskosten: €${kmCompensation.toFixed(2)}<br>
      BTW: €${btw.toFixed(2)}<br><br>
      <strong>Totaal: €${grand.toFixed(2)}</strong>
    </div>

    ${footerText ? `<div style="font-family:${headerFont}; font-size:${headerSize}px;">${footerText}</div>` : ''}

  </div>`;

  // ======================
  // UITGEKLEDE FACTUUR
  // ======================
  let simpleRows = '';
  currentInvoiceWorkdays.forEach((day, idx) => {
    if(!document.getElementById(`include_${idx}`)?.checked) return;

    const km = parseFloat(document.getElementById(`km_${idx}`)?.value) || 0;
    const hours = parseFloat(document.getElementById(`hours_${idx}`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`rate_${idx}`)?.value) || HOURLY_RATE;

    const amount = hours * rate;

    simpleRows += `
      <tr>
        <td>${formatDateToDutch(new Date(day.startWorkdayTime))}</td>
        <td>${km.toFixed(1)}</td>
        <td>€${amount.toFixed(2)}</td>
      </tr>`;
  });

  let simpleInvoice = `
  <div style="font-family:${contentFont};">
    <h1>Factuur</h1>

    <table style="width:100%; border:1px solid black; border-collapse:collapse;">
      <tr><th>Datum</th><th>Kilometers</th><th>€</th></tr>
      ${simpleRows}
    </table>

    <div style="text-align:right;">
      Totaal: €${grand.toFixed(2)}
    </div>
  </div>`;

  // ======================
  // TOELICHTING
  // ======================
  let explanationDoc = `
  <div style="font-family:${contentFont};">
    <h1>Toelichting</h1>

    <table style="width:100%; border-collapse:collapse;">
      <tr>
        <th>Datum</th>
        <th>Toelichting</th>
        <th>Uren</th>
      </tr>
      ${explanationRows}
    </table>

    <div style="text-align:right;">
      Totaal uren: ${totalHours.toFixed(2)}
    </div>
  </div>`;

  // ======================
  // RESULTAAT
  // ======================
  const container = document.getElementById('invoicePreviewContainer');
  container.style.display = 'block';

  if(secretMode) {
    container.innerHTML = simpleInvoice + '<hr>' + explanationDoc;
  } else {
    container.innerHTML = normalInvoice;
  }

  document.getElementById('step3').style.display = 'block';
}
</script>

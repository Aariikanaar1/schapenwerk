<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Factuur maken - Schapenwerk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f5f7fb; padding: 20px 16px 80px 16px; }
    .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    button { border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.1s; font-family: inherit; flex: 1; min-width: 100px; }
    button:active { transform: scale(0.97); }
    .btn-primary { background: #0077cc; color: white; }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-small { padding: 8px 16px; font-size: 0.75rem; flex: none; }
    .toggle-switch { display: flex; align-items: center; justify-content: space-between; background: #f1f5f9; padding: 12px 16px; border-radius: 48px; margin: 15px 0; }
    .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: 0.2s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%; }
    input:checked + .slider { background-color: #0077cc; }
    input:checked + .slider:before { transform: translateX(22px); }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 0.9rem; margin-top: 6px; font-family: inherit; }
    label { font-weight: 500; margin-top: 12px; display: block; font-size: 0.8rem; color: #475569; }
    .invoice-row { display: flex; gap: 8px; align-items: center; padding: 8px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
    .extra-line-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
    .invoice-preview { background: white; border-radius: 16px; padding: 24px; max-height: 60vh; overflow-y: auto; margin-top: 16px; display: none; border: 1px solid #e2e8f0; }
    .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .font-settings { display: flex; gap: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="card">
  <label>Opdrachtgever</label>
  <select id="invoiceClientSelect"></select>
  
  <label>Jaar</label>
  <input type="number" id="invoiceYearInput" value="2026">
  <label>Maand</label>
  <select id="invoiceMonthSelect">
    <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maart</option>
    <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
    <option value="6">Juli</option><option value="7">Augustus</option><option value="8">September</option>
    <option value="9">Oktober</option><option value="10">November</option><option value="11">December</option>
  </select>
  
  <label>💰 BTW Percentage</label>
  <select id="vatPercentage"><option value="21">21%</option><option value="6">6%</option><option value="0">0%</option></select>
  
  <label>➕ Extra factuurregels (handmatig toevoegen)</label>
  <div id="extraLinesContainer" class="extra-lines-container"></div>
  <button id="addExtraLineBtn" class="btn-small" style="background: #10b981; margin-top: 10px;">+ Voeg regel toe</button>
  
  <div class="toggle-switch secret-switch">
    <span>🤫 Ik heb geheimen voor de belastingdienst</span>
    <label class="switch"><input type="checkbox" id="secretModeToggle"><span class="slider"></span></label>
  </div>
  <div id="secretInfo" style="background:#eef2ff; padding:12px; border-radius:16px; font-size:0.75rem; margin-top:8px; display:none;">✅ Uitgeklede factuur + apart toelichtingsdocument</div>
  
  <label>✏️ Koptekst (optioneel)</label>
  <textarea id="invoiceHeader" rows="2"></textarea>
  
  <label>✏️ Voettekst (optioneel)</label>
  <textarea id="invoiceFooter" rows="2"></textarea>
  
  <div class="font-settings">
    <select id="fontFamilySelect"><option value="'Inter', sans-serif">Inter</option><option value="'Times New Roman', serif">Times New Roman</option><option value="'Courier New', monospace">Courier New</option><option value="'Georgia', serif">Georgia</option></select>
    <select id="fontSizeSelect"><option value="12">12px</option><option value="14" selected>14px</option><option value="16">16px</option><option value="18">18px</option></select>
  </div>
  
  <div id="invoiceEditor" style="max-height:300px; overflow-y:auto; margin:16px 0;"></div>
  
  <div class="button-group">
    <button id="refreshInvoiceBtn" class="btn-secondary">🔄 Herlaad werkdagen</button>
    <button id="generateInvoiceBtn" class="btn-primary">💰 Genereer & download</button>
    <button id="generateAndSendBtn" class="btn-primary">📧 Genereer & verstuur</button>
  </div>
  
  <div id="invoicePreviewContainer"></div>
</div>

<script>
let HOURLY_RATE = 25.00, KM_RATE = 0.21;
let contacts = [];
let currentInvoiceWorkdays = [];
let extraLines = [];
let companyLogo = null;

function showWarning(msg){ window.parent.postMessage({type:'warning',message:msg},'*'); }
function escapeHtml(s){if(!s)return'';return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;')}
function formatDateToDutch(d){return `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}`}
function formatTimestamp(d){if(!d)return'—';return new Date(d).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}
function getContactDisplayName(c){return c.company?.trim()||c.name||'Onbekend'}

function loadRates(){const h=localStorage.getItem('hourlyRate');if(h)HOURLY_RATE=parseFloat(h);const k=localStorage.getItem('kmRate');if(k)KM_RATE=parseFloat(k);}
loadRates();

function loadContacts(){const s=localStorage.getItem('contacts');if(s)contacts=JSON.parse(s);updateInvoiceClientSelect();}
function updateInvoiceClientSelect() {
  const sel = document.getElementById('invoiceClientSelect');
  if(sel) {
    sel.innerHTML = '<option value="">-- Selecteer opdrachtgever --</option>';
    contacts.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = getContactDisplayName(c);
      sel.appendChild(opt);
    });
  }
}
loadContacts();

function loadInvoiceWorkdays() {
  const clientId = parseInt(document.getElementById('invoiceClientSelect').value);
  if(!clientId) { document.getElementById('invoiceEditor').innerHTML = '<p>Selecteer eerst een opdrachtgever</p>'; return; }
  const client = contacts.find(c => c.id === clientId);
  if(!client) return;
  const year = parseInt(document.getElementById('invoiceYearInput').value);
  const month = parseInt(document.getElementById('invoiceMonthSelect').value);
  const sessions = JSON.parse(localStorage.getItem('workSessionsList')||'[]');
  currentInvoiceWorkdays = sessions.filter(s => {
    const d = new Date(s.startWorkdayTime);
    return d.getMonth() === month && d.getFullYear() === year && 
           (s.client || '').toLowerCase().includes((client.name || client.company || '').toLowerCase());
  });
  renderInvoiceEditor();
}

function renderInvoiceEditor() {
  const container = document.getElementById('invoiceEditor');
  if(!currentInvoiceWorkdays.length) { container.innerHTML = '<p>Geen werkdagen gevonden in deze periode</p>'; return; }
  container.innerHTML = `<div style="margin-bottom:12px;"><strong>✏️ Selecteer welke dagen op de factuur komen:</strong></div>` +
    currentInvoiceWorkdays.map((day, idx) => `
      <div class="invoice-row">
        <input type="checkbox" id="include_${idx}" checked style="width:30px;">
        <span style="min-width:90px;">${formatDateToDutch(new Date(day.startWorkdayTime))}</span>
        <input type="number" id="hours_${idx}" value="${(day.workSeconds/3600).toFixed(2)}" step="0.25" style="width:70px;"><span>uur</span>
        <input type="number" id="km_${idx}" value="${(day.totalDrivingKm || 0).toFixed(1)}" step="0.1" style="width:70px;"><span>km</span>
        <input type="number" id="rate_${idx}" value="${(day.hourlyRate || HOURLY_RATE).toFixed(2)}" step="0.5" style="width:80px;"><span>€/uur</span>
      </div>
    `).join('');
}

function renderExtraLines() {
  const container = document.getElementById('extraLinesContainer');
  if(!container) return;
  container.innerHTML = extraLines.map((line, idx) => `
    <div class="extra-line-item">
      <input type="date" class="extra-date" value="${line.date}" style="width:120px;">
      <input type="text" class="extra-description" value="${escapeHtml(line.description)}" placeholder="Omschrijving" style="flex:3;">
      <input type="number" class="extra-amount" value="${line.amount}" step="0.01" placeholder="Bedrag" style="width:100px;">
      <button onclick="removeExtraLine(${idx})" class="btn-small" style="background:#ef4444;">✖</button>
    </div>
  `).join('');
  
  document.querySelectorAll('.extra-date, .extra-description, .extra-amount').forEach((el, i) => {
    el.addEventListener('change', () => {
      const dates = document.querySelectorAll('.extra-date');
      const descs = document.querySelectorAll('.extra-description');
      const amounts = document.querySelectorAll('.extra-amount');
      extraLines = Array.from(dates).map((d, idx) => ({
        date: d.value,
        description: descs[idx]?.value || '',
        amount: parseFloat(amounts[idx]?.value) || 0
      }));
    });
  });
}

function removeExtraLine(index) {
  extraLines.splice(index, 1);
  renderExtraLines();
}

function generatePDF(elementId, filename) {
  const element = document.getElementById(elementId);
  if(element && element.innerHTML.trim()) {
    html2pdf().set({ margin: 0.5, filename: filename }).from(element).save();
  }
}

function generateInvoice(andSend = false) {
  const clientId = parseInt(document.getElementById('invoiceClientSelect').value);
  if(!clientId) { alert('Selecteer een opdrachtgever'); return; }
  const client = contacts.find(c => c.id === clientId);
  if(!client) return;
  
  const year = parseInt(document.getElementById('invoiceYearInput').value);
  const month = parseInt(document.getElementById('invoiceMonthSelect').value);
  const vat = parseFloat(document.getElementById('vatPercentage').value);
  const secretMode = document.getElementById('secretModeToggle').checked;
  const fontFamily = document.getElementById('fontFamilySelect').value;
  const fontSize = document.getElementById('fontSizeSelect').value;
  const headerText = document.getElementById('invoiceHeader').value;
  const footerText = document.getElementById('invoiceFooter').value;
  
  const company = {
    name: localStorage.getItem('companyName') || '',
    street: localStorage.getItem('companyStreet') || '',
    location: localStorage.getItem('companyLocation') || '',
    iban: localStorage.getItem('companyIban') || '',
    kvk: localStorage.getItem('companyKvk') || ''
  };
  companyLogo = localStorage.getItem('companyLogo');
  
  let total = 0;
  let rows = '';
  let detailedRows = '';
  
  currentInvoiceWorkdays.forEach((day, idx) => {
    const include = document.getElementById(`include_${idx}`)?.checked;
    if(!include) return;
    const hours = parseFloat(document.getElementById(`hours_${idx}`)?.value) || 0;
    const km = parseFloat(document.getElementById(`km_${idx}`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`rate_${idx}`)?.value) || HOURLY_RATE;
    const workAmt = hours * rate;
    const kmAmt = km * KM_RATE;
    const sub = workAmt + kmAmt;
    total += sub;
    rows += `| 5美金<td style="border:1px solid #000; padding:8px;">${formatDateToDutch(new Date(day.startWorkdayTime))} 5美金<td style="border:1px solid #000; padding:8px;">${escapeHtml(day.notes || 'Werkdag')} 5美金<td style="border:1px solid #000; padding:8px;">${hours.toFixed(2)} uur 5美金<td style="border:1px solid #000; padding:8px;">€${workAmt.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">${km.toFixed(1)} km 5美金<td style="border:1px solid #000; padding:8px;">€${kmAmt.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">€${sub.toFixed(2)} 5美金`;
    if(secretMode) {
      detailedRows += `| 5美金<td style="border:1px solid #000; padding:8px;">${formatDateToDutch(new Date(day.startWorkdayTime))} 5美金<td style="border:1px solid #000; padding:8px;">${escapeHtml(day.notes || 'Werkdag')} 5美金<td style="border:1px solid #000; padding:8px;">${hours.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">€${rate.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">€${workAmt.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">${km.toFixed(1)} 5美金<td style="border:1px solid #000; padding:8px;">€${KM_RATE.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">€${kmAmt.toFixed(2)} 5美金<td style="border:1px solid #000; padding:8px;">€${sub.toFixed(2)} 5美金`;
    }
  });
  
  extraLines.forEach(line => {
    const amount = line.amount;
    total += amount;
    rows += `| 5美金<td style="border:1px solid #000; padding:8px;">${line.date || ''} 5美金<td style="border:1px solid #000; padding:8px;">${escapeHtml(line.description)} 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;">€${amount.toFixed(2)} 5美金`;
    if(secretMode) {
      detailedRows += `| 5美金<td style="border:1px solid #000; padding:8px;">${line.date || ''} 5美金<td style="border:1px solid #000; padding:8px;">${escapeHtml(line.description)} 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;"> 5美金<td style="border:1px solid #000; padding:8px;">€${amount.toFixed(2)} 5美金`;
    }
  });
  
  if(total === 0) { alert('Geen dagen geselecteerd voor de factuur'); return; }
  
  const btw = total * (vat / 100);
  const grand = total + btw;
  const invoiceNumber = `F${year}${(month+1).toString().padStart(2,'0')}${Math.floor(Math.random() * 1000)}`;
  const invoiceDate = formatDateToDutch(new Date());
  const logoHtml = companyLogo ? `<img src="${companyLogo}" style="max-height:60px; margin-bottom:10px;">` : '';
  const clientDisplay = `${client.company || client.name || ''}${client.street ? ', ' + client.street : ''}${client.city ? ', ' + client.city : ''}`;
  const companyDisplay = `${company.name || 'Uw bedrijf'}<br>${company.street || ''}<br>${company.location || ''}<br>IBAN: ${company.iban || ''}<br>KvK: ${company.kvk || ''}`;
  
  let html = '';
  
  if(secretMode) {
    html = `<div id="invoiceToPrint" style="font-family:${fontFamily}; font-size:${fontSize}px; max-width:800px; margin:0 auto;">
      ${logoHtml}
      <h2>FACTUUR ${invoiceNumber}</h2>
      <p><strong>${company.name || 'Uw bedrijf'}</strong><br>${company.street || ''}<br>${company.location || ''}<br>IBAN: ${company.iban || ''}<br>KvK: ${company.kvk || ''}</p>
      <p>${clientDisplay}</p>
      <p>Datum: ${invoiceDate}</p>
      ${headerText ? `<p>${headerText}</p>` : ''}
      <table border="1" cellpadding="5" style="width:100%; border-collapse:collapse;">
        <thead> 5美金<th>Omschrijving</th><th>Bedrag</th> 5美金</thead>
        <tbody> 5美金<td>Werkzaamheden periode ${new Date(year, month).toLocaleString('nl-NL', { month: 'long' })} ${year} 5美金<td>€${total.toFixed(2)} 5美金</tbody>
      5美金
      ${footerText ? `<p>${footerText}</p>` : ''}
      <p><em>Een apart toelichtingsdocument met de specificaties is bijgevoegd.</em></p>
    </div>
    <div id="explanationDoc" style="font-family:${fontFamily}; font-size:${fontSize}px; max-width:800px; margin:0 auto;">
      <h2>TOELICHTING BIJ FACTUUR ${invoiceNumber}</h2>
      <p><strong>${clientDisplay}</strong></p>
      <p>Hieronder vindt u de specificatie van de werkzaamheden:</p>
      <table border="1" cellpadding="5" style="width:100%; border-collapse:collapse;">
        <thead> 5美金<th>Datum</th><th>Omschrijving</th><th>Uren</th><th>Uurloon</th><th>Bedrag werk</th><th>KM</th><th>KM vergoeding</th><th>Totaal</th> 5美金</thead>
        <tbody>${detailedRows.replace(/\|/g, '')}</tbody>
        <tfoot> 5美金<td colspan="7" align="right"><strong>Totaal</strong> 5美金<td><strong>€${total.toFixed(2)}</strong> 5美金</tfoot>
      5美金
    </div>`;
    document.getElementById('invoicePreviewContainer').innerHTML = html;
    generatePDF('invoiceToPrint', `Factuur_${invoiceNumber}.pdf`);
    setTimeout(() => {
      const el = document.getElementById('explanationDoc');
      if(el) html2pdf().set({ margin: 0.5, filename: `Toelichting_${invoiceNumber}.pdf` }).from(el).save();
    }, 500);
  } else {
    html = `<div id="invoiceToPrint" style="font-family:${fontFamily}; font-size:${fontSize}px; max-width:800px; margin:0 auto;">
      ${logoHtml}
      <h2>FACTUUR ${invoiceNumber}</h2>
      <p><strong>${company.name || 'Uw bedrijf'}</strong><br>${company.street || ''}<br>${company.location || ''}<br>IBAN: ${company.iban || ''}<br>KvK: ${company.kvk || ''}</p>
      <p>${clientDisplay}</p>
      <p>Datum: ${invoiceDate}</p>
      ${headerText ? `<p>${headerText}</p>` : ''}
      <table border="1" cellpadding="5" style="width:100%; border-collapse:collapse;">
        <thead> 5美金<th>Datum</th><th>Omschrijving</th><th>Uren</th><th>Bedrag werk</th><th>KM</th><th>KM vergoeding</th><th>Totaal</th> 5美金</thead>
        <tbody>${rows.replace(/\|/g, '')}</tbody>
        <tfoot>
          5美金<td colspan="6" align="right"><strong>Totaal excl. BTW</strong> 5美金<td><strong>€${total.toFixed(2)}</strong> 5美金
          5美金<td colspan="6" align="right">BTW (${vat}%) 5美金<td><strong>€${btw.toFixed(2)}</strong> 5美金
          5美金<td colspan="6" align="right"><strong>Totaal incl. BTW</strong> 5美金<td><strong>€${grand.toFixed(2)}</strong> 5美金
        </tfoot>
      5美金
      ${footerText ? `<p>${footerText}</p>` : ''}
    </div>`;
    document.getElementById('invoicePreviewContainer').innerHTML = html;
    generatePDF('invoiceToPrint', `Factuur_${invoiceNumber}.pdf`);
  }
  
  let invoices = JSON.parse(localStorage.getItem('savedInvoices') || '[]');
  invoices.push({ id: Date.now(), invoiceNumber, clientName: client.company || client.name || 'Onbekend', year, month, date: new Date().toISOString(), html, total: grand });
  localStorage.setItem('savedInvoices', JSON.stringify(invoices));
  
  if(andSend) {
    setTimeout(() => { window.location.href = `mailto:?subject=Factuur ${invoiceNumber}&body=Beste, hierbij de factuur in bijlage.`; }, 1000);
  } else {
    alert(`Factuur ${invoiceNumber} is gedownload en opgeslagen!`);
  }
}

document.getElementById('refreshInvoiceBtn').onclick = loadInvoiceWorkdays;
document.getElementById('generateInvoiceBtn').onclick = () => generateInvoice(false);
document.getElementById('generateAndSendBtn').onclick = () => generateInvoice(true);
document.getElementById('addExtraLineBtn').onclick = () => { extraLines.push({ date: '', description: '', amount: 0 }); renderExtraLines(); };
document.getElementById('secretModeToggle').onchange = () => {
  document.getElementById('secretInfo').style.display = document.getElementById('secretModeToggle').checked ? 'block' : 'none';
};

// Laad logo
const logo = localStorage.getItem('companyLogo');
if(logo) companyLogo = logo;

renderExtraLines();
loadInvoiceWorkdays();
</script>
</body>
</html>

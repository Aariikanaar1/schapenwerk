<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schapenwerk Download</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #0077cc; margin-bottom: 16px; }
        .download-btn {
            background: #0077cc;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            width: 100%;
        }
        .instructions {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 16px;
            text-align: left;
            font-size: 14px;
            margin-top: 20px;
        }
        .warning {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🐑</div>
        <h1>Schapenwerk</h1>
        <p>Uren & kilometerregistratie voor ZZP'ers</p>
        
        <button class="download-btn" id="downloadBtn">
            📱 Download APK (Android)
        </button>
        
        <div class="instructions">
            <strong>📖 Installatie-instructies:</strong><br><br>
            1. Download de APK<br>
            2. Open de APK op je telefoon<br>
            3. Sta installatie van onbekende bronnen toe<br>
            4. Open de app en geef toestemmingen<br><br>
            <span style="color:#f59e0b;">⚠️ Alleen voor Android</span>
        </div>
        
        <div class="warning">
            📱 Na installatie vind je de app op je startscherm
        </div>
    </div>
    
    <script>
        document.getElementById('downloadBtn').onclick = () => {
            window.location.href = 'Schapenwerk.apk';
        };
        
        if(/Android/i.test(navigator.userAgent)) {
            document.getElementById('downloadBtn').innerHTML = '📱 Download nu (Android)';
        } else {
            document.getElementById('downloadBtn').innerHTML = '📱 Alleen voor Android';
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('downloadBtn').style.opacity = '0.5';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Privé rit - Schapenwerk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f5f7fb; padding: 20px 16px 80px 16px; }
    .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    button { border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.1s; font-family: inherit; }
    button:active { transform: scale(0.97); }
    .btn-start { background: #10b981; color: white; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-primary { background: #0077cc; color: white; }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-small { padding: 8px 16px; font-size: 0.75rem; flex: none; }
    .toggle-switch { display: flex; align-items: center; justify-content: space-between; background: #f1f5f9; padding: 12px 16px; border-radius: 48px; margin: 15px 0; }
    .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: 0.2s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: 0.2s; border-radius: 50%; }
    input:checked + .slider { background-color: #0077cc; }
    input:checked + .slider:before { transform: translateX(22px); }
    input { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 0.9rem; margin-top: 6px; font-family: inherit; }
    label { font-weight: 500; margin-top: 12px; display: block; font-size: 0.8rem; color: #475569; }
    .timer-value { font-size: 2rem; font-weight: 700; font-family: monospace; text-align: center; background: #f8fafc; padding: 12px; border-radius: 20px; margin: 10px 0; }
    .private-stop-item { background: #fef3c7; border-radius: 16px; padding: 12px; margin-bottom: 12px; }
    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  </style>
</head>
<body>

<div class="card" style="background: #fef3c7;">
  <h3>🏠 Privé rit modus</h3>
  <p style="font-size:0.8rem; margin-top:8px;">Kilometers worden geregistreerd als privé. GPS en stappenteller werken automatisch.</p>
</div>

<div style="background: white; border-radius: 24px; padding: 16px; margin-bottom: 20px; border-left: 4px solid #0077cc;">
  <div style="font-weight: 700; margin-bottom: 8px;">🚗 PRIVÉ RIT</div>
  <div class="timer-value" id="privateDistanceDisplay">0.0 km</div>
  <div style="display: flex; gap: 10px;">
    <button id="startPrivateBtn" class="btn-start">▶ Start rit</button>
    <button id="stopPrivateBtn" class="btn-stop" style="display: none;">⏹ Stop rit</button>
  </div>
</div>

<div class="toggle-switch">
  <span>🗺️ GPS volgen</span>
  <label class="switch"><input type="checkbox" id="privateTrackingToggle" checked><span class="slider"></span></label>
</div>

<div class="toggle-switch">
  <span>👣 Stappenteller (privé)</span>
  <label class="switch"><input type="checkbox" id="privateStepToggle" checked><span class="slider"></span></label>
</div>

<div id="privateStopsContainer"></div>

<label>➕ Handmatige stop</label>
<div class="flex-row">
  <input type="text" id="privateStopLocation" placeholder="Locatie" style="flex:2;">
  <input type="number" id="privateStopKm" step="0.1" placeholder="km stand" style="flex:1;">
  <button id="addPrivateStopBtn" class="btn-small">➕ Toevoegen</button>
</div>

<p id="privateStatusMsg" style="margin-top:12px; font-size:0.75rem; color:#64748b;"></p>

<script>
let privateActive = false;
let privateDistance = 0;
let privateStartOdo = null;
let privateStops = [];
let privateRoutePoints = [];
let privateGeoWatchId = null;
let privateLastGpsPosition = null;
let privateStepCounterActive = true;
let privateIsWalking = false;
let privateLastStepTime = 0;
let privateCurrentSteps = 0;

function showWarning(msg){ window.parent.postMessage({type:'warning',message:msg},'*'); }
function formatTimestamp(d){ if(!d) return '—'; return new Date(d).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); }
function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

function renderPrivateStops() {
  const container = document.getElementById('privateStopsContainer');
  if(!container) return;
  if(privateStops.length === 0) {
    container.innerHTML = '<div class="card" style="background:#f8fafc;">📍 Nog geen stops geregistreerd</div>';
    return;
  }
  container.innerHTML = privateStops.map((stop, i) => `
    <div class="private-stop-item">
      <div><strong>📍 ${escapeHtml(stop.location)}</strong></div>
      <div>📟 ${stop.startOdo} km → ${stop.endOdo} km</div>
      <button onclick="removePrivateStop(${i})" class="btn-small" style="margin-top:8px; background:#ef4444;">🗑️ Verwijder</button>
    </div>
  `).join('');
}

window.removePrivateStop = (i) => {
  privateStops.splice(i, 1);
  renderPrivateStops();
  savePrivateState();
};

function savePrivateState() {
  localStorage.setItem('privateState', JSON.stringify({
    privateActive, privateDistance, privateStartOdo, privateStops, privateRoutePoints, privateCurrentSteps
  }));
}

function loadPrivateState() {
  const s = localStorage.getItem('privateState');
  if(s) try {
    const d = JSON.parse(s);
    privateActive = d.privateActive || false;
    privateDistance = d.privateDistance || 0;
    privateStartOdo = d.privateStartOdo;
    privateStops = d.privateStops || [];
    privateRoutePoints = d.privateRoutePoints || [];
    privateCurrentSteps = d.privateCurrentSteps || 0;
    if(privateActive) {
      document.getElementById('startPrivateBtn').style.display = 'none';
      document.getElementById('stopPrivateBtn').style.display = 'block';
      document.getElementById('privateDistanceDisplay').innerText = privateDistance.toFixed(1);
    }
    renderPrivateStops();
  } catch(e) {}
}

function addPrivateStop(location, startOdo, endOdo) {
  privateStops.push({ location, startOdo, endOdo });
  renderPrivateStops();
  savePrivateState();
}

function processPrivateGpsPosition(pos) {
  if(!privateActive || !document.getElementById('privateTrackingToggle')?.checked) return;
  const newPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  if(privateLastGpsPosition) {
    const dist = Math.sqrt(Math.pow(newPos.lat - privateLastGpsPosition.lat, 2) + Math.pow(newPos.lng - privateLastGpsPosition.lng, 2)) * 111;
    if(dist < 0.02) {
      privateDistance += dist;
      document.getElementById('privateDistanceDisplay').innerText = privateDistance.toFixed(1);
      privateRoutePoints.push([newPos.lat, newPos.lng]);
    }
  }
  privateLastGpsPosition = newPos;
}

function startPrivateGeoLocation() {
  if(privateGeoWatchId) return;
  privateGeoWatchId = navigator.geolocation.watchPosition(processPrivateGpsPosition,
    err => console.warn(err),
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 });
}

function stopPrivateGeoLocation() {
  if(privateGeoWatchId) {
    navigator.geolocation.clearWatch(privateGeoWatchId);
    privateGeoWatchId = null;
  }
}

if (window.DeviceMotionEvent) {
  window.addEventListener('devicemotion', function(e) {
    if(!privateActive || !privateStepCounterActive) return;
    const a = e.accelerationIncludingGravity;
    if(a) {
      const m = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
      if(m > 12 && m < 25) {
        const now = Date.now();
        if(now - privateLastStepTime > 200) {
          privateCurrentSteps++;
          privateLastStepTime = now;
          if(!privateIsWalking) {
            privateIsWalking = true;
            document.getElementById('privateStatusMsg').innerHTML = '🚶‍♂️ Lopen gedetecteerd...';
          }
        }
      } else if(privateIsWalking && (Date.now() - privateLastStepTime) > 3000) {
        privateIsWalking = false;
        document.getElementById('privateStatusMsg').innerHTML = '📍 Gestopt met lopen';
      }
    }
  });
}

async function startPrivateRit() {
  privateActive = true;
  privateStartOdo = parseFloat(document.getElementById('startOdo')?.value) || 0;
  privateDistance = 0;
  privateStops = [];
  privateRoutePoints = [];
  privateCurrentSteps = 0;
  document.getElementById('startPrivateBtn').style.display = 'none';
  document.getElementById('stopPrivateBtn').style.display = 'block';
  document.getElementById('privateDistanceDisplay').innerText = '0.0 km';
  document.getElementById('privateStatusMsg').innerHTML = '🏠 Privé rit actief';
  if(document.getElementById('privateTrackingToggle').checked) startPrivateGeoLocation();
  savePrivateState();
}

async function stopPrivateRit() {
  privateActive = false;
  const session = {
    id: Date.now(),
    startTime: new Date().toISOString(),
    endTime: new Date().toISOString(),
    distance: privateDistance,
    startOdo: privateStartOdo,
    endOdo: privateStartOdo + privateDistance,
    stops: privateStops,
    route: privateRoutePoints,
    isPrivate: true,
    steps: privateCurrentSteps
  };
  let privateSessions = JSON.parse(localStorage.getItem('privateSessions') || '[]');
  privateSessions.push(session);
  localStorage.setItem('privateSessions', JSON.stringify(privateSessions));
  
  document.getElementById('startPrivateBtn').style.display = 'block';
  document.getElementById('stopPrivateBtn').style.display = 'none';
  document.getElementById('privateStatusMsg').innerHTML = '✅ Privé rit opgeslagen!';
  stopPrivateGeoLocation();
  privateStops = [];
  privateRoutePoints = [];
  renderPrivateStops();
  savePrivateState();
  showWarning('✅ Privé rit opgeslagen!');
}

document.getElementById('startPrivateBtn').onclick = startPrivateRit;
document.getElementById('stopPrivateBtn').onclick = stopPrivateRit;
document.getElementById('privateTrackingToggle').onchange = (e) => {
  localStorage.setItem('privateGpsToggleState', e.target.checked);
  if(e.target.checked && privateActive) startPrivateGeoLocation();
  else if(!e.target.checked) stopPrivateGeoLocation();
};
document.getElementById('privateStepToggle').onchange = (e) => {
  localStorage.setItem('privateStepToggleState', e.target.checked);
  privateStepCounterActive = e.target.checked;
};
document.getElementById('addPrivateStopBtn').onclick = () => {
  const location = document.getElementById('privateStopLocation').value.trim();
  const km = parseFloat(document.getElementById('privateStopKm').value);
  if(!location || isNaN(km)) { showWarning('❌ Vul locatie en km stand in'); return; }
  addPrivateStop(location, km, km);
  document.getElementById('privateStopLocation').value = '';
  document.getElementById('privateStopKm').value = '';
  showWarning('✅ Stop toegevoegd');
};

loadPrivateState();
</script>
</body>
</html>
